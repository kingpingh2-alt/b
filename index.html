<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EV Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>⚡ EV Savings Calculator</h1>

  <input type="number" id="km" placeholder="Daily KM Driven">
  <input type="number" id="petrol" placeholder="Petrol Price (₹/L)">
  <input type="number" id="electric" placeholder="Electricity Cost (₹/kWh)">
  <input type="number" id="mileage" placeholder="Car Mileage (km/L)">

  <button id="btn">Calculate Savings</button>

  <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
